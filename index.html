let PARSHA_VIDEOS = JSON.parse(JSON.stringify(PARSHA_VIDEOS_FALLBACK));
function getYouTubeId(v){
  if(!v) return null;
  v = String(v).trim();
  if(/^[A-Za-z0-9_-]{11}$/.test(v)) return v;
  const m = v.match(/(?:youtu\.be\/|[?&]v=|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function fmtGreg(iso){ if(!iso) return ''; const p = iso.split('-'); return (+p[2]) + '.' + (+p[1]) + '.' + p[0]; }

// ===== Multi-year lecture helpers (data model: PARSHA_VIDEOS[id] = [ {url,date,dateHe,year,visible} ]) =====
function lecturesFor(id){ const v = PARSHA_VIDEOS[id]; return Array.isArray(v) ? v : (v && v.url ? [v] : []); }
function visibleLecturesFor(id){
  return lecturesFor(id)
    .filter(l => l && l.visible !== false && getYouTubeId(l.url))
    .sort((a,b) => (a.date < b.date ? 1 : (a.date > b.date ? -1 : 0)));
}
function hasVisibleVideo(id){ return visibleLecturesFor(id).length > 0; }
function lectureBtnLabel(l){
  const greg = l.date ? l.date.slice(0,4) : '';
  return (l.year || '') + ((l.year && greg) ? ' · ' : '') + greg;
}
function lecturePlayerHTML(p, l){
  const vid = getYouTubeId(l.url); if(!vid) return '';
  const heDate = l.dateHe || (window.gregToHebrew ? window.gregToHebrew(l.date) : '');
  const dateLine = l.date ? `<div class="lecture-date">📅 ${heDate ? heDate + ' · ' : ''}${fmtGreg(l.date)}</div>` : '';
  return `<div class="video-embed"><iframe src="https://www.youtube.com/embed/${vid}?rel=0&playsinline=1" title="שיעור לפרשת ${p.name}" allow="accelerometer; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen></iframe></div>
      <div class="lecture-caption">🎥 שיעור לפרשת ${p.name}</div>
      ${dateLine}`;
}
function lectureSectionHTML(p){
  const lecs = visibleLecturesFor(p.id);
  if(!lecs.length) return '';
  const tabs = lecs.length > 1
    ? `<div class="year-tabs">${lecs.map((l,i)=>`<button class="year-btn${i===0?' active':''}" onclick="showLectureYear(${p.id},${i},this)">${lectureBtnLabel(l)}</button>`).join('')}</div>`
    : '';
  return `<div class="lecture-block" id="lectureBlock-${p.id}">${tabs}<div class="lecture-player" id="lecturePlayer-${p.id}">${lecturePlayerHTML(p, lecs[0])}</div></div>`;
}
function showLectureYear(id, idx, btn){
  const p = PARSHAS.find(x => x.id === id); if(!p) return;
  const lecs = visibleLecturesFor(id); const l = lecs[idx]; if(!l) return;
  const holder = document.getElementById('lecturePlayer-' + id);
  if(holder) holder.innerHTML = lecturePlayerHTML(p, l);
  if(btn){ const par = btn.parentElement; par.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
}
function loadVideosJson(){
  fetch('videos.json', {cache:'no-store'})
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if(data && typeof data === 'object' && !Array.isArray(data)){
        PARSHA_VIDEOS = data;
        renderSidebar();
        if(currentParsha === null) renderMain();
        else if(typeof currentParsha === 'number' && currentParsha > 0) window.openDetail(currentParsha);
      }
    })
    .catch(function(){ /* offline / file:// -> baked-in fallback stays */ });
}

const EASY_EXPLAIN = {
1:`פרשת בראשית היא הפרשה הראשונה בתורה ומספרת את הסיפור הכי גדול שיש — איך הכל התחיל. ה' ברא את העולם בשישה ימים: אור, שמיים, ים ויבשה, כוכבים, בעלי חיים, ובסוף — את האדם. ביום השביעי ה' נח, ומכאן מגיע רעיון השבת. אדם וחוה חיים בגן עדן, אבל אוכלים מהפרי האסור ומגורשים. אחר כך קין הורג את הבל אחיו מקנאה. הפרשה מלמדת אותנו שלכל בחירה יש תוצאות, שקנאה הורסת, ושהאחריות על העולם היא שלנו. היום, כשאנחנו מתמודדים עם שינויי אקלים ואתגרים סביבתיים, הציווי "לעבדה ולשמרה" רלוונטי יותר מתמיד — העולם הזה ניתן לנו בפיקדון.`,
2:`פרשת נח מספרת על עולם שהשתבש לגמרי. אנשים היו אלימים וגנבו אחד מהשני, והמצב היה כל כך גרוע שה' החליט להביא מבול. אדם אחד בלבד היה צדיק — נח. ה' ציווה אותו לבנות תיבה ענקית ולהכניס בה מכל חיה זוג, את משפחתו, ולהציל את החיים. המבול ירד ארבעים יום, ואחריו נח שלח יונה שחזרה עם עלה של זית — סימן שהעולם מתחדש. ה' הבטיח לא להשמיד עוד את העולם, ונתן את הקשת בענן כסימן. אחר כך בני אדם ניסו לבנות מגדל שמגיע לשמיים (מגדל בבל), וה' בלבל את שפתם. הלקח: גם כשהעולם נראה אבוד, תמיד אפשר להתחיל מחדש. היום, כשמשברים גלובליים מאיימים, צריך להיות כמו נח — לפעול גם כשאף אחד אחר לא מבין למה.`,
3:`ה' פונה לאברם (שיהפוך לאברהם) ואומר לו: עזוב את הבית, את המשפחה, את הארץ שלך — ולך למקום חדש שאני אראה לך. אברהם, בגיל 75, עושה את הצעד הכי אמיץ שיש — עוזב את הכל ויוצא לדרך. הוא מגיע לארץ כנען, יורד למצרים בגלל רעב, חוזר, נלחם כדי להציל את אחיינו לוט, וכורת ברית עם ה' — ברית בין הבתרים, שבה ה' מבטיח שלזרע אברהם תהיה ארץ. שמו משתנה לאברהם, וברית המילה נעשית. זו הפרשה שמתחיל בה הסיפור של עם ישראל. היום, כל מי שעוזב אזור נוחות — עולה לארץ, פותח עסק, משנה כיוון — עושה "לך לך" שלו. האומץ לצאת לדרך לא ידועה הוא המסר הנצחי.`,
4:`פרשה מלאה רגשות ואירועים דרמטיים. אברהם יושב בפתח האוהל ורואה שלושה אנשים (מלאכים) — הוא רץ אליהם ומכניס אותם, מגיש אוכל ומכבד אותם. הם מבשרים ששרה תלד בן. אברהם מתפלל על סדום ועמורה ומנסה להציל את הערים הרשעות — מתווכח עם ה' על צדק. יצחק נולד, הגר וישמעאל מגורשים, ואז מגיע הניסיון הכי קשה — עקדת יצחק. ה' מבקש מאברהם להקריב את בנו היחיד. אברהם שותק ועולה להר, ורק ברגע האחרון מלאך עוצר אותו. הפרשה מלמדת על הכנסת אורחים, על המאבק למען צדק, ועל אמונה עד הסוף. היום, ההכנסת אורחים של אברהם מאתגרת אותנו — האם אנחנו פותחים את הדלת לאחר?`,
5:`שרה, אשת אברהם, מתה בגיל 127. אברהם מחפש מקום קבורה וקונה את מערת המכפלה בחברון — העסקה הראשונה של רכישת קרקע בארץ ישראל. זה רגע מכונן: הזיקה המשפטית הראשונה של עם ישראל לארצו. אחרי האבל, אברהם שולח את עבדו אליעזר למצוא אישה ליצחק. אליעזר מגיע לבאר, מתפלל, ורבקה מופיעה — נדיבה, חכמה ואמיצה. היא מסכימה לנסוע לארץ רחוקה ולהתחתן עם אדם שמעולם לא פגשה. אברהם עצמו נפטר ונקבר ליד שרה. הפרשה עוסקת במעברים — סוף ותחילה, אבל ותקווה. היום, מערת המכפלה עדיין במרכז פוליטי סוער, ושאלות של נדל"ן וזכות היסטורית ממשיכות לעורר ויכוח. סיפור רבקה מראה שלפעמים ההחלטות הגדולות ביותר דורשות קפיצה אל הלא נודע.`,
6:`יצחק ורבקה מתפללים עשרים שנה לילדים. לבסוף נולדים תאומים — עשו ויעקב, שונים לחלוטין זה מזה. עשו — חזק, אדמוני, ציד, איש שדה. יעקב — שקט, יושב אוהלים, חכם. יום אחד עשו חוזר מהשדה עייף ומוכר את הבכורה ליעקב תמורת נזיד עדשים. כשיצחק מזדקן ורוצה לברך את עשו, רבקה מתכננת שיעקב יקבל את הברכות במקומו. יעקב מתחפש, יצחק מברך אותו, ועשו כועס כעס נורא. יעקב בורח לחרן. הפרשה שואלת שאלות קשות: האם המטרה מצדיקה את האמצעים? מה קורה כשהורים מעדיפים ילד אחד? קנאה בין אחים היא סיפור נצחי — גם היום במשפחות, בעסקים, ובפוליטיקה. כל אחד מאיתנו הוא תערובת של יעקב ועשו.`,
7:`יעקב בורח מעשו ובדרך חולם חלום מדהים — סולם שמגיע לשמיים, מלאכים עולים ויורדים, וה' מבטיח לו שישמור עליו. הוא מגיע לחרן, רואה את רחל ליד הבאר ומתאהב. עובד שבע שנים כדי לשאת אותה, אבל לבן רמאי ונותן לו את לאה. יעקב עובד עוד שבע שנים בשביל רחל. במשך עשרים שנה הוא בונה משפחה גדולה — שנים עשר בנים שיהיו שנים עשר השבטים. לבן מנסה לרמות אותו שוב ושוב, אבל יעקב מצליח ומתעשר. בסוף, הוא עוזב בחזרה לארץ ישראל. הפרשה מספרת על אהבה, עבודה קשה, ורמאויות. היום, הנושא של עובדים שנוצלים על ידי מעסיקים לא פחות רלוונטי — זכויות עובדים, הבטחות שלא מקויימות, ומאבק על מה שמגיע.`,
8:`יעקב חוזר לארץ ישראל ופוחד מהמפגש עם עשו. בלילה שלפני, הוא נשאר לבד ונאבק עם מלאך — כל הלילה. הוא נפצע ברגלו אבל לא מוותר, והמלאך משנה את שמו מיעקב לישראל — "כי שרית עם אלוהים ועם אנשים ותוכל". המפגש עם עשו עובר בשלום, הם מתחבקים ובוכים. אבל אחר כך מגיעה טרגדיה — דינה בת יעקב נחטפת בשכם, ושמעון ולוי הורגים את כל אנשי העיר בנקמה. רחל מתה בלידת בנימין ונקברת בדרך לבית לחם. הפרשה עוסקת בשינוי — יעקב הופך לישראל, מתמודד עם עברו ובונה עתיד חדש. כולנו נאבקים עם "מלאכים" — אתגרים פנימיים, פחדים, טראומות. הפרשה מלמדת שלפעמים דווקא המאבק הכי כואב הוא זה שמשנה אותנו.`,
9:`יוסף, הבן האהוב של יעקב, מקבל כתונת פסים מיוחדת ומספר לאחיו על חלומות שבהם הם משתחווים לו. האחים מקנאים, שונאים אותו, ומחליטים למכור אותו כעבד. יוסף מגיע למצרים, עובד בבית פוטיפר, ומצליח. אבל אשת פוטיפר מנסה לפתות אותו, הוא מסרב, והיא מאשימה אותו שקר. יוסף נזרק לכלא. גם שם הוא לא מתייאש — פותר חלומות לשני אסירים. הפרשה מלמדת על קנאה שמובילה לאסון, על יושרה מוסרית גם בתנאים הכי קשים, ועל אמונה שבסוף הכל יסתדר. היום, סיפור יוסף מדבר על בריונות, על מי שנדחה חברתית אבל לא שובר, ועל הטרדה מינית — יוסף הוא אחד הראשונים ב"Me Too" ההיסטורי.`,
10:`יוסף יושב בכלא כבר שנתיים כשפתאום פרעה חולם חלומות מוזרים — שבע פרות שמנות ושבע פרות רזות, שבע שיבולים טובות ושבע יבשות. אף אחד לא יכול לפתור, ואז נזכרים ביוסף. הוא מובא מהכלא, מפרש שמדובר בשבע שנות שפע ואחריהן שבע שנות רעב, ומציע תוכנית כלכלית מבריקה. פרעה כל כך מתרשם שממנה אותו למשנה למלך — מאסיר לשליט בן-לילה. כשהרעב מגיע, אחי יוסף יורדים למצרים לקנות אוכל ולא מזהים אותו. יוסף מזהה אותם ובוחן אם השתנו. הפרשה מלמדת על ניהול משברים, חשיבה קדימה, וסבלנות. היום, כל מנהיג צריך "תוכנית יוסף" — לחסוך בשנות השפע כדי לשרוד את שנות המשבר.`,
11:`הרגע הכי דרמטי בספר בראשית. יהודה — אותו אח שהציע למכור את יוסף — עומד עכשיו לפני השליט המצרי (שהוא יוסף בתחפושת) ונושא נאום מרגש. הוא מוכן למסור את חייו כדי להציל את בנימין. ברגע הזה יוסף לא יכול עוד להתאפק וקורא: "אני יוסף! העוד אבי חי?" האחים בשוק, מלאי בושה. אבל יוסף לא נוקם — הוא מחבק, בוכה, ואומר: ה' שלח אותי לפניכם כדי להציל חיים. יעקב שומע שיוסף חי ויורד עם כל המשפחה למצרים. הפרשה מלמדת על כוח המחילה ועל שינוי אמיתי. יהודה השתנה מקצה לקצה — מאדם שמוכר את אחיו לאדם שמוסר את נפשו. היום, הפרשה מדברת על ריבים משפחתיים, על פיוס, ועל האומץ לסלוח.`,
12:`הפרשה האחרונה בספר בראשית. יעקב חי במצרים 17 שנה ומרגיש שסופו קרב. הוא מברך את נכדיו אפרים ומנשה, ואז מברך כל אחד משנים עשר בניו — ברכות מותאמות אישית, כל אחת חודרת לאופי ולעתיד של השבט. יהודה מקבל ברכת מלכות, יוסף ברכת שפע, בנימין ברכת גבורה. יעקב מבקש להיקבר בארץ ישראל, במערת המכפלה, ולא במצרים — הוא לא שוכח מאיפה הוא בא. יעקב נפטר, מובא לקבורה בחברון, ויוסף מבטיח לאחיו שהוא לא ינקום. הפרשה מלמדת שכל ילד שונה ודורש ברכה משלו — עיקרון חינוכי עדכני. גם הרצון להיקבר בארץ ישראל חי עד היום. ספר בראשית נחתם בגלות — המסע עוד לא נגמר.`,
13:`ספר שמות נפתח במצב חדש ומפחיד. בני ישראל, שהגיעו כמשפחה קטנה, הפכו לעם גדול — ופרעה החדש מפחד מהם. הוא משעבד אותם בעבודת פרך, ומצווה להרוג כל תינוק זכר. אישה אמיצה בשם יוכבד שמה את בנה בתיבה על היאור, ובת פרעה מוצאת אותו וקוראת לו משה. משה גדל בארמון, אבל כשהוא רואה מצרי מכה עברי — הוא מתערב ובורח למדיין. שם, ליד סנה שבוער ולא נשרף, ה' מתגלה אליו ושולח אותו בחזרה למצרים לשחרר את העם. "אהיה אשר אהיה" — שם ה' שנחשף. הפרשה היא סיפור של מנהיגות שנולדת מתוך חמלה. משה לא רצה להיות מנהיג — אבל ראה עוול ולא יכול היה לשתוק. היום, כל מי שעומד מול אי-צדק ומחליט לפעול — עושה מעשה של "סנה בוער".`,
14:`ה' שולח את משה ואהרן לפרעה: "שלח את עמי!" פרעה מסרב, והמכות מתחילות. שבע מכות מתוך עשר פוקדות את מצרים בפרשה הזו: הנילוס הופך לדם, צפרדעים מציפות את הארץ, כינים, חיות רעות (ערוב), מגיפה בבהמות (דבר), שחין כואב, וברד עם אש. אחרי כל מכה פרעה מבטיח לשחרר — ואז חוזר בו. הפרשה מראה את העקשנות של פרעה ואת כוח ה'. כל מכה הייתה מכוונת נגד אל מצרי — הנילוס שנחשב אל הפך לדם. השאלה הגדולה: למה ה' הקשה את לב פרעה? האם הוא באמת יכול היה לבחור אחרת? השאלה הזו של בחירה חופשית מול גורל רלוונטית גם היום — עד כמה אנחנו באמת בוחרים את הדרך שלנו, ומתי אנחנו כבר "נעולים" על דפוס?`,
15:`הרגע הגדול של יציאת מצרים. שלוש המכות האחרונות פוקדות את מצרים — ארבה שאוכל הכל, חושך כה כבד שאי אפשר לזוז, ולבסוף מכת בכורות. לפני המכה האחרונה, ה' מצווה על בני ישראל לשחוט כבש (שהמצרים עבדו אותו), למרוח את הדם על המשקוף, ולאכול אותו בחיפזון עם מצות. בלילה הזה — ליל הסדר — ה' פוסח על בתי ישראל, וכל בכורי מצרים מתים. פרעה נכנע ומשלח את ישראל. הם יוצאים בחיפזון כזה שהבצק לא מספיק לתפוח — ומכאן המצה. הפרשה מלמדת על אומץ ועל זיכרון. ליל הסדר הוא המאורע המשפחתי הכי חשוב בלוח השנה היהודי. גם בשנות קורונה המשיכו לקיים סדרים, ולו בזום. "בכל דור ודור חייב אדם לראות עצמו כאילו הוא יצא ממצרים."`,
16:`הרגע שבני ישראל חשבו שהם חופשיים — פרעה שינה את דעתו ורדף אחריהם עם כל צבאו. העם תקוע בין הים לבין הצבא המצרי, ואז קורה הנס הגדול ביותר: הים נקרע! בני ישראל עוברים ביבשה, והמצרים טובעים. הרגש כל כך גדול שכל העם פורץ בשירה — "שירת הים", ומרים הנביאה מובילה את הנשים בריקוד עם תופים. אבל אחרי הנס מתחיל המדבר — העם צמא ורעב. ה' שולח מן (לחם מהשמיים) ומים מן הסלע. גם עמלק תוקף ויש מלחמה. הפרשה מלמדת שגאולה היא לא רגע אחד אלא תהליך. גם אחרי הרגע הכי גבוה מגיעים אתגרים. היום, כל מי שעבר משבר יודע — הרגע שאחרי ההצלה קשה לא פחות. צריך אמונה כדי להמשיך.`,
17:`הפרשה הכי חשובה בתורה לדעת רבים — מעמד הר סיני ומתן עשרת הדיברות. לפני כן, יתרו חותן משה מגיע ומביא עצה גאונית: אי אפשר שמשה ישפוט לבד מיליוני אנשים. צריך מערכת שופטים, מנהלים, שכבות של הנהגה. משה מקשיב. ואז מגיע הרגע — הר סיני רועד, קולות וברקים, ענן כבד, וקול שופר. ה' מדבר עם כל העם ונותן עשרת הדיברות: "אנוכי ה' אלוהיך", לא תרצח, לא תגנוב, לא תנאף, כבד את אביך ואמך, ועוד. העם כל כך נבהל שמבקש ממשה שהוא ידבר עם ה' במקומם. הפרשה מלמדת שני דברים חשובים: מנהיג חכם יודע להאציל סמכות (עצת יתרו), ויש עקרונות מוסריים שהם בסיס לכל חברה — לא לרצוח, לא לגנוב, לכבד הורים. אלה הם יסוד הציוויליזציה עד היום.`,
18:`אחרי עשרת הדיברות מגיעים החוקים המעשיים — איך לנהל חברה צודקת. דיני עבדים (עם זכויות!), מה קורה כשור נוגח, איך מפצים על נזק, חובת השבת אבדה, איסור לקחת ריבית מעני, ועוד. בסוף הפרשה — הרגע שבו כל ישראל אומרים "נעשה ונשמע" — נסכים לעשות עוד לפני ששמענו את כל הפרטים. זו קפיצת אמונה. משה עולה להר סיני. הפרשה מלמדת שתורה היא לא רק רוחניות אלא חוק חברתי. הגנה על העובד, פיצוי על נזק, עזרה לעני — כל אלה חוקים שמנוסחים כאן אלפי שנים לפני חוקי העבודה המודרניים. "עין תחת עין" פורש בתלמוד כפיצוי כספי — צדק מתקן ולא נקמה. זה רלוונטי לכל מערכת משפט מודרנית.`,
19:`ה' מבקש מבני ישראל לבנות לו "בית" — המשכן, מקדש נייד במדבר. אבל במקום לצוות, הוא מבקש תרומות: "מאת כל איש אשר ידבנו ליבו". כל הפרטים מתוארים — ארון הברית מעץ שיטים מצופה זהב, מנורת זהב טהור עם שבעה קנים, שולחן לחם הפנים, יריעות צמר ועורות. הפסוק המרכזי: "ועשו לי מקדש ושכנתי בתוכם" — לא "בתוכו" אלא "בתוכם", בתוך כל אדם. הפרשה מלמדת שמקום קדוש נבנה מנדיבות לב, לא מכפייה. כל כלי במשכן מסמל ערך — הארון את הלימוד, המנורה את האור והחוכמה, השולחן את הפרנסה. היום, כל מי שבונה בית, קהילה או ארגון — בונה "משכן". השאלה היא אם אנחנו שמים בו לב, או רק קירות.`,
20:`פרשה מיוחדת — הפרשה היחידה מאז לידת משה ששמו לא מוזכר בה. היא עוסקת בבגדי הכהונה ובהכנת אהרן ובניו לעבודת המשכן. נר התמיד — אור שצריך לדלוק תמיד. האפוד — בגד מיוחד עם אבני שוהם שעליהן שמות השבטים. החושן — עם שנים עשר אבנים יקרות, אחת לכל שבט, על ליבו של הכהן. הציץ — עם הכיתוב "קודש לה'" על מצחו. "לכבוד ולתפארת" — הבגדים לא רק מכסים, הם מעניקים כבוד ומשמעות לתפקיד. הפרשה מלמדת על כוח הלבוש — גם היום, מה שאנחנו לובשים משפיע על איך שאנחנו מרגישים ואיך אחרים מתייחסים אלינו. מדים, חליפות, גלימות — הלבוש יוצר תפקיד. והרעיון של "נושא על הלב" — מנהיג אמיתי נושא את האנשים שלו על הלב.`,
21:`הפרשה הכי דרמטית בספר שמות. משה עולה להר סיני לארבעים יום, והעם נבהל כי הוא לא חוזר. הם בונים עגל זהב ומשתחווים לו — ארבעים יום בלבד אחרי שאמרו "נעשה ונשמע"! משה יורד מההר, רואה את העגל, ושובר את הלוחות. העונש קשה, אבל משה מתפלל על העם ומציל אותם. הוא עולה שוב להר, וה' מתגלה אליו בשלוש עשרה מידות הרחמים: "ה' ה' אל רחום וחנון..." — המילים שאומרים בכל תפילת סליחות. משה מקבל לוחות שניים. הפרשה מלמדת שנפילה היא לא סוף — אפשר לקום, לבקש סליחה, ולקבל הזדמנות חדשה. הלוחות השניים חשובים יותר מהראשונים כי הם מגיעים אחרי שבירה ותיקון. היום, כל מי שנפל ומחפש דרך חזרה — זה הסיפור שלו.`,
22:`אחרי חטא העגל, הגיע זמן לתקן. משה מקהיל את כל העם ומזכיר את שמירת השבת — גם בניית המשכן לא דוחה אותה. ואז מגיע רגע מרגש: העם תורם מרצון לבניית המשכן. זהב, כסף, נחושת, תכלת, ארגמן, עורות, שמן, אבנים יקרות — כל אחד נותן מה שיש לו. התרומות כל כך גדולות שמשה צריך להכריז: "די! אל תביאו יותר!" בצלאל ואהליאב, אמנים שה' מילא בחוכמה, מובילים את הבנייה. הפרשה מלמדת שתיקון בא דרך בנייה — לא מספיק להצטער על העגל, צריך לבנות משהו חיובי במקום. היום, crowdfunding ונדבנות קהילתית הם ה"ויקהל" המודרני. וכשבצלאל מקבל "חוכמת לב" — זה מזכיר שגם יצירתיות ואומנות הם עבודת ה'.`,
23:`הפרשה האחרונה בספר שמות. חשבון כל החומרים שהושקעו במשכן — שקיפות מלאה, אפילו ממשה רבנו. ואז — הרגע הגדול: משה מקים את המשכן בראש חודש ניסן. הוא מרכיב את הקרשים, פורש את היריעות, מציב את הארון, מדליק את המנורה, ומעלה קטורת. וכשהכל מוכן — "ויכס הענן את אוהל מועד וכבוד ה' מלא את המשכן". ענן ה' שורה על המשכן, ומנחה את ישראל בנסיעותיהם. ספר שמות מסתיים — מעבדות במצרים לשכינה שורה בתוך ישראל. המסע הושלם. הפרשה מלמדת על שקיפות כספית ועל הרגע שבו כל המאמץ נושא פרי. היום, כשפרויקט מסתיים, כשחלום מתגשם — זהו רגע "פקודי". ו"חזק חזק ונתחזק" — סיום שמחזק, לא מרפה.`,
24:`ספר ויקרא נפתח בקריאה של ה' למשה — בא"לף קטנה, סימן לענוותנות. הפרשה עוסקת בקרבנות: עולה (נשרפת כליל), מנחה (ממאפה ושמן), שלמים (משפחתיים), חטאת (על חטא בשגגה), ואשם (על אשמה ספציפית). המילה "קרבן" באה מ"קרבה" — להתקרב לה'. כל סוג קרבן מותאם למצב אחר: מי שרוצה להודות, מי שחטא, מי שרוצה שלום. הפרשה נראית רחוקה מאיתנו — אין מקדש ואין קרבנות. אבל חז"ל אמרו שהתפילה מחליפה קרבן, ושלימוד תורה "כאילו הקריב". הרעיון העמוק הוא "להקריב" — לוותר על משהו, לתת מעצמך, כדי להתקרב. זה נכון בכל מערכת יחסים — עם ה', עם אנשים, עם עצמך. לתת זה לקבל.`,
25:`המשך חוקי הקרבנות, הפעם מנקודת מבטו של הכהן. הנקודה המרכזית: "אש תמיד תוקד על המזבח, לא תכבה" — האש לא כבתה אף פעם. גם בגשם, גם ברוח. שבעת ימי המילואים — שבוע שלם של הכנה לפני שאהרן ובניו מתחילים לעבוד במשכן. לא קופצים לתפקיד — מתכוננים, מתלמדים, מתקדשים. הפרשה מלמדת על התמדה ועל הכנה. האש התמידית מסמלת דברים שצריכים להישמר כל הזמן — מערכות יחסים, ערכים, מוטיבציה. אם מפסיקים "להאכיל את האש" — היא כבה. ושבעת ימי ההכנה מזכירים שכל תפקיד חשוב דורש onboarding — לא ייתכן שרופא, שופט או מנהיג יתחיל לעבוד בלי הכנה.`,
26:`יום השמיני — יום חנוכת המשכן. אש יורדת מהשמיים וכולם שמחים. אבל אז — טרגדיה. נדב ואביהוא, בני אהרן, מקריבים "אש זרה שלא ציווה אותם" — ואש יוצאת מלפני ה' ושורפת אותם. אהרן שותק. ה' אומר: "בקרובי אקדש" — מי שקרוב לקדושה, הרף גבוה יותר. אחרי הטרגדיה, הפרשה עוברת לחוקי כשרות — אילו בהמות, דגים, עופות ושרצים מותרים ואילו אסורים. סנפיר וקשקשת — מותר. מפריס פרסה ומעלה גירה — מותר. הפרשה מלמדת שגם התלהבות דתית צריכה גבולות, וש"קדושה" אומרת גם "הבחנה" — לדעת להבדיל בין מותר לאסור, בין ראוי לבלתי ראוי. היום, הנושא של קיצוניות דתית ושל חוקי כשרות חוזר בשיח הציבורי.`,
27:`פרשה שנשמעת רחוקה אבל מאוד רלוונטית. כשלאדם מופיע כתם מוזר בעור — הוא הולך לכהן (לא לרופא!). הכהן בודק אם זו "צרעת" — נגע רוחני, לא מחלה רגילה. חז"ל אמרו שצרעת באה על לשון הרע — דיבור רע על אנשים. "מצורע" = "מוציא שם רע". מי שנמצא מצורע מושלח מחוץ למחנה, לבד, עד שנרפא. הרעיון: דיבור רע מרחיק אותך מהקהילה, ממש כמו מחלה. הפרשה מאוד רלוונטית לעידן הדיגיטלי. לשון הרע היום מתפשט בשנייה — טוויט אחד, פוסט אחד, סטורי אחד — יכול להרוס חיים, קריירה, משפחה. ה"צרעת" המודרנית היא cancel culture, ביטול חברתי. הפרשה מלמדת שמילים הן לא "סתם" — הן יכולות לפגוע כמו מעשים.`,
28:`ההמשך של פרשת תזריע — הפעם על הריפוי. מצורע שנרפא עובר תהליך מובנה: שתי ציפורים (אחת נשחטת, אחת משתלחת), גילוח, טבילה, שבעת ימי המתנה, וקרבנות. למה ציפורים? כי ציפורים מצייצות — כמו מי שמפטפט ומרכל. הפרשה גם עוסקת בצרעת בתים — אם כתמים מופיעים על קירות הבית. ובזב וזבה — טומאה שקשורה לגוף. הלקח המרכזי: תשובה דורשת תהליך. אי אפשר פשוט לומר "סליחה" ולהמשיך הלאה. צריך זמן, מעשים, הפנמה. היום, תהליכי שיקום — ממכורים, מאסירים, מטראומה — מבוססים על אותו עיקרון: שלבים, זמן, ליווי. המדריך (הכהן) לא שופט אלא מלווה. זו גישה טיפולית מודרנית שהתורה הציגה לפני אלפי שנים.`,
29:`הפרשה פותחת אחרי מות בני אהרן ומתארת את עבודת יום הכיפורים — היום הקדוש ביותר בשנה. הכהן הגדול נכנס לקודש הקודשים — המקום הכי קדוש בעולם, פעם אחת בשנה בלבד. שני שעירים: אחד קרבן לה', ואחד משתלח לעזאזל — נושא את חטאי העם למדבר. הכהן מתוודה בשם כל ישראל. הפרשה גם כוללת רשימת עריות אסורות. המסר המרכזי: יש יום שבו מוחלים על הכל, ניתנת הזדמנות חדשה. אבל — "בין אדם לחברו אין יום הכיפורים מכפר עד שירצה את חברו". לפני שמבקשים מחילה מה', צריך לבקש מחילה מאנשים. היום, ערב יום כיפור הפך לריטואל של שליחת הודעות "סליחה" ב-WhatsApp. הצום, השקט, העצירה — בעולם שלא עוצר אף פעם, יום אחד כזה הוא מתנה.`,
30:`"קדושים תהיו" — שתי המילים הכי חשובות בתורה לדעת רבים. הפרשה היא אוסף מרוכז של מצוות שמכסות את כל החיים: כבדו את ההורים, שמרו שבת, אל תגנבו, אל תשקרו, אל תנקמו, השאירו פאת השדה לעניים. ובמרכז: "ואהבת לרעך כמוך" — שרבי עקיבא אמר שזה "כלל גדול בתורה", והלל הזקן סיכם: "מה ששנוא עליך לא תעשה לחברך — זוהי כל התורה כולה". קדושה לפי התורה היא לא רק תפילה — היא איך שאתה מתנהג עם אנשים, בעסקים, בשוק, ברחוב. הפרשה מלמדת שקדושה היא דבר יומיומי — לא משהו שעושים רק בבית כנסת. "ואהבת לרעך כמוך" הוא הבסיס לזכויות אדם, לדמוקרטיה, ולכל חברה צודקת. זה הפסוק שכל אדם צריך לזכור.`,
31:`פרשת אמור מציגה את לוח השנה היהודי השלם — כל המועדים ברצף אחד. שבת (כל שבוע), פסח (חירות), ספירת העומר (49 ימים של ציפייה), שבועות (מתן תורה), ראש השנה (יום הדין), יום כיפור (סליחה), סוכות (שמחה), ושמיני עצרת. הפרשה גם עוסקת בדיני כוהנים — רמת קדושה גבוהה יותר, מגבלות על מי שיכול לשרת. ובסוף — סיפור המקלל, שקילל את שם ה' ונענש. הפרשה מלמדת שהזמן עצמו יכול להיות קדוש. החגים יוצרים מקצב שנתי — עצירות מתוזמנות בתוך השגרה. היום, בעולם שרץ ללא הפסקה, הצורך ב"מועדים" — זמנים קבועים למשפחה, למשמעות, לשמחה — חשוב מתמיד. לוח השנה היהודי הוא "תוכנית חיים" שלמה.`,
32:`שמיטה ויובל — רעיונות מהפכניים. כל שבע שנים, הארץ "שובתת" — לא חורשים, לא זורעים. מה שגדל מעצמו — לכולם, לא לבעל השדה. כל חמישים שנה — יובל: עבדים משתחררים, קרקעות חוזרות לבעליהן המקוריים, חובות נמחקים. "וקראתם דרור בארץ לכל יושביה" — הפסוק שחקוק על פעמון החירות בפילדלפיה. הרעיון: הארץ שייכת לה', לא לנו. אנחנו "גרים ותושבים". הפרשה מלמדת על "reset" — לאפס, לתת לכולם הזדמנות חדשה. היום, הרעיון מהדהד בשיח על מחיקת חובות של מדינות עניות, על שנות שבתון, על שמיטה אקולוגית. בעידן של צריכה מטורפת, הרעיון של "לא לגעת — לתת לארץ לנוח" הוא רדיקלי ונחוץ.`,
33:`הפרשה האחרונה בספר ויקרא — ברכות וקללות. אם תלכו בדרך ה' — גשמים בזמנם, שלום, שפע, בריאות. אם לא — מחלות, מלחמות, גלות, חורבן. ה"תוכחה" מתארת בפירוט מצמרר דברים שאכן התרחשו בהמשך ההיסטוריה — חורבן בית ראשון ושני, גלות, רדיפות, שואה. אבל — זה לא נגמר בייאוש. "וזכרתי את בריתי... ואת הארץ אזכור" — ה' מבטיח שלא ישכח, שתמיד תהיה חזרה. הפרשה מלמדת שבחירות מובילות לתוצאות — לא קסם, אלא חוקיות. אבל גם שתמיד יש תקווה. אחרי השואה — מדינת ישראל. אחרי הגלות — שיבת ציון. "וזכרתי" — ה' לא שוכח. ספר ויקרא נחתם ב"חזק חזק ונתחזק" — קריאה להמשיך, לא לוותר, לחזק זה את זה.`,
34:`ספר במדבר נפתח במפקד — ספירת כל בני ישראל לפי שבטים. ה' מצווה: "שאו את ראש כל עדת בני ישראל" — לא רק לספור, אלא "להרים ראש", לתת חשיבות לכל אחד. כל שבט מקבל מקום מוגדר סביב המשכן — צפון, דרום, מזרח, מערב. סדר, ארגון, כל אחד יודע את מקומו. שבט לוי לא נמנה עם האחרים כי תפקידו מיוחד — שמירה על המשכן. הפרשה מלמדת שלכל אדם יש מקום ותפקיד. "שאו את ראש" — כל אחד חשוב, כל אחד נספר. היום, בעולם שבו אנשים מרגישים אבודים ולא חשובים, המסר הזה מרגיע: יש לך מקום, יש לך תפקיד, אתה חלק מהסיפור הגדול. מפקד אוכלוסין הוא עדיין כלי חשוב — כי לדעת מי אנחנו זה הצעד הראשון לדעת לאן אנחנו הולכים.`,
35:`הפרשה הארוכה ביותר בתורה — 176 פסוקים. נקודת השיא: ברכת כוהנים — "יברכך ה' וישמרך, יאר ה' פניו אליך ויחונך, ישא ה' פניו אליך וישם לך שלום". שלוש שורות פשוטות אבל עמוקות — ברכה, אור, שלום. הפרשה גם עוסקת בנזיר — אדם שמקבל על עצמו פרישות (לא שותה יין, לא מסתפר) כדי להתקדש. ובדיני סוטה — אישה שנחשדה בבגידה. ובקרבנות שנים עשר הנשיאים — כל אחד הביא בדיוק אותו קרבן, אבל כל אחד נרשם בנפרד. הפרשה מלמדת על כוח הברכה. "ישם לך שלום" — בארץ שחיה במלחמות, השלום הוא הברכה הנכספת ביותר. ברכת כוהנים נאמרת בכותל כל חג — אלפי כוהנים פורשים ידיים מעל מאות אלפי אנשים. רגע מרגש שמחבר את כולם.`,
36:`פרשה של מעברים. אהרן מדליק את המנורה. בני ישראל חוגגים פסח שני — מי שפספס את הפסח הראשון מקבל הזדמנות נוספת. חצוצרות כסף משמשות לאותות נסיעה ומלחמה. ואז המסע מתחיל מהר סיני — והבעיות מתחילות. העם מתלונן: "מי יאכילנו בשר?" הם מתגעגעים למצרים (!) ומשה מותש. ה' ממנה 70 זקנים לעזור לו. מרים ואהרן מדברים על משה ("על אודות האישה הכושית") ומרים נענשת בצרעת. הפרשה מלמדת שני דברים: תמיד יש הזדמנות שנייה (פסח שני), ולשון הרע פוגע — גם כשזה בין אחים, גם כשהכוונה "טובה". היום, קבוצות WhatsApp משפחתיות מלאות "דאגה" שהיא למעשה רכילות. הפרשה מזכירה: דיבור על אנשים, גם מתוך אהבה, יכול לפגוע.`,
37:`שנים עשר מרגלים נשלחים לתור את ארץ כנען. הם חוזרים עם ענבים ענקיים ותאנים מרהיבות, אבל עשרה מתוכם מפחידים את העם: "הערים בצורות, והענקים עצומים, ונהי בעינינו כחגבים!" רק יהושע וכלב אומרים: "עלה נעלה, כי יכול נוכל לה!" אבל העם בוכה, רוצה לחזור למצרים, וה' גוזר: הדור הזה לא ייכנס לארץ — ארבעים שנות נדודים. בסוף הפרשה ה' נותן את מצוות הציצית — חוטים על הבגד שמזכירים את כל המצוות. הפרשה מלמדת על כוח הפחד ועל כוח הדיבור. "ונהי בעינינו כחגבים" — הבעיה הייתה בתדמית העצמית. זו "תסמונת המתחזה" של ימינו — כשאתה חושב שאתה קטן מדי, אתה באמת מפסיד. יהושע וכלב מלמדים שאמונה ואופטימיות מנצחים פחד.`,
38:`קורח, לוי עשיר ומכובד, מוביל מרד נגד משה ואהרן. הטענה נשמעת הגיונית: "כל העדה כולם קדושים, ומדוע תתנשאו על קהל ה'?" — בעצם, למה אתם מנהיגים ואנחנו לא? אבל מאחורי מילים יפות על שוויון מסתתרת שאיפת כוח אישית. משה מציע מבחן — כל אחד יביא קטורת, וה' יבחר. התוצאה דרמטית: האדמה נפתחת ובולעת את קורח ועדתו. מטה אהרן פורח — הוכחה אלוהית לבחירת שבט לוי. הפרשה מלמדת להבדיל בין מחלוקת אמיתית לבין פוליטיקה של כוח. "מחלוקת שאינה לשם שמיים — זו מחלוקת קורח." היום, בעידן של פופוליזם ודמגוגיה, הפרשה מלמדת לבדוק: האם המנהיג באמת דואג לעם, או רק רוצה כוח?`,
39:`פרשה של חוקים וטרגדיות. פרה אדומה — חוק שאף אחד לא מבין, אפילו לא שלמה המלך החכם ביותר. האפר שלה מטהר טמאים ומטמא טהורים — פרדוקס מוחלט. מרים מתה, והמים נפסקו — כי הבאר הייתה בזכותה ולא ידעו. משה צריך להוציא מים מסלע — צריך לדבר אליו, אבל בכעסו הוא מכה בו. העונש: לא ייכנס לארץ ישראל. אהרן מת בהר ההר. נחשים שרפים נושכים את העם, ומשה מרים נחש נחושת שמרפא את מי שמסתכל עליו. הפרשה מלמדת שגם המנהיג הגדול ביותר לא חסין מטעויות, ושרגע של כעס יכול לעלות ביוקר. היום, כמה פעמים שלחנו מייל או הודעה בזעם — ושילמנו על זה? הפרשה גם מלמדת שנשים "שקטות" כמו מרים תורמות עצום — ורק כשהן נעלמות מבינים כמה.`,
40:`אחד הסיפורים הכי צבעוניים בתורה. בלק מלך מואב רואה שישראל מתקרבים ונבהל. הוא שוכר את בלעם, נביא גוי מפורסם, כדי לקלל את ישראל. בלעם עולה על אתונו, אבל האתון רואה מלאך שבלעם לא רואה — ומסרבת ללכת. בלעם מכה אותה, והאתון פותחת את פיה ומדברת! כשבלעם מגיע ופותח את פיו לקלל — יוצאות ברכות. שלוש פעמים הוא מנסה לקלל ושלוש פעמים מברך. "מה טובו אוהליך יעקב" — ברכה שהפכה לתפילת בוקר. בלעם שם לב שפתחי האוהלים לא מכוונים זה מול זה — שמירה על פרטיות. הפרשה מלמדת שמי שרוצה לפגוע בישראל — בסוף מברך אותם. והערך של פרטיות — "מה טובו" — רלוונטי מאוד בעידן של מצלמות אבטחה, רשתות חברתיות, וחוסר גבולות דיגיטליים.`,
41:`פינחס מקבל "ברית שלום" על מעשהו הקיצוני. מפקד חדש נערך. ואז — סיפור בנות צלפחד, אחד הרגעים הפמיניסטיים הראשונים בהיסטוריה. חמש אחיות — מחלה, נועה, חוגלה, מלכה ותרצה — עומדות לפני משה ואומרות: אבא שלנו מת בלי בנים, למה נפסיד את הנחלה? משה שואל את ה', וה' אומר: הן צודקות. ההלכה משתנה. יהושע ממונה כיורש משה. ואחרון — רשימת כל קרבנות המוספים של המועדים. הפרשה מלמדת שצדק יכול לבוא מלמטה — מאנשים "קטנים" שתובעים את זכותם. בנות צלפחד לא המתינו שמישהו ייאבק עבורן. היום, נשים בכנסת, בצבא, בהייטק, במשפט — ממשיכות את הדרך. ומעבר מנהיגותי ממשה ליהושע — מעבר חלק, ללא מאבק כוח — מודל שכל ארגון ומדינה צריכים.`,
42:`שתי פרשיות שלעתים נקראות יחד. נדרים — כשאדם נודר נדר, המילים שלו הופכות לחוק. "מוצא שפתיך תשמור" — מה שיוצא מהפה, מחייב. מלחמת מדיין — נקמה על חטא בעל פעור. ואז — בני גד ובני ראובן רואים את עבר הירדן, אדמה טובה לבהמות, ואומרים למשה: אנחנו רוצים להישאר פה, לא לעבור את הירדן. משה כועס: אחיכם הולכים למלחמה ואתם רוצים לשבת? הם מגיעים לפשרה — ילחמו עם כולם, ואחר כך יחזרו. הפרשה מלמדת על אחריות לדיבור ועל אחריות לאומית. "מוצא שפתיך" — הבטחת בחירות, חוזה עסקי, הבטחה לילד — צריך לקיים. והויכוח של גד וראובן — כשהרווחה האישית מתנגשת עם הצורך הלאומי. רלוונטי לכל ויכוח על שירות מילואים, מיסים, ותרומה לחברה.`,
43:`הפרשה האחרונה בספר במדבר מתחילה ברשימה של 42 תחנות שבני ישראל עברו בארבעים שנות המדבר. כל שם — רפידים, קברות התאווה, חצרות — מספר סיפור. אחר כך — גבולות ארץ ישראל מוגדרים בדיוק. ערי מקלט — שש ערים שבהן רוצח בשגגה יכול למצוא מחסה מנקמת דם. ובסוף — חזרה לבנות צלפחד: הן צריכות להתחתן בתוך שבטן כדי שהנחלה לא תעבור שבט. ספר במדבר מסתיים בנקודת מבט על ארץ ישראל — הם כמעט שם. הפרשה מלמדת שכל מסע מורכב מתחנות, וכל תחנה חשובה. ערי המקלט הן רעיון מהפכני — הגנה על אדם שהרג בשגגה, הפרדה בין נקמה לצדק. היום, מערכת המשפט מבוססת על אותו עיקרון: להבדיל בין כוונה לתוצאה.`,
44:`ספר דברים נפתח — והוא שונה מכל הספרים האחרים. כאן משה מדבר. בן 120, יודע שלא ייכנס לארץ, נואם לדור החדש ומסכם את הכל. הוא מזכיר את חטא המרגלים, את הנדודים, את המלחמות. מזכיר שהוא ביקש מהעם למנות שופטים — "שופטים ושוטרים תיתן לך". מזכיר את הניצחונות על סיחון ועוג. הנאום הזה הוא צוואה — לא רק סיכום עבר, אלא הנחיות לעתיד. הפרשה מלמדת על מנהיגות של פרידה — לדעת לעזוב בכבוד, להעביר שרביט, לא להיצמד לכיסא. משה לא נלחם על המשך תפקידו. היום, מנהיגים שיודעים לעזוב בזמן הם נדירים ויקרים. גם הנושא של מערכת משפט עצמאית — שופטים שלא תלויים בשלטון — רלוונטי לדיונים בישראל.`,
45:`הפרשה שמכילה את הפסוק הכי חשוב ביהדות: "שמע ישראל ה' אלוהינו ה' אחד". שש מילים שמגדירות את הזהות היהודית. משה חוזר על עשרת הדיברות, מצווה על "ואהבת את ה' אלוהיך בכל לבבך", ומלמד להעביר את התורה לילדים: "ושננתם לבניך". גם מצוות תפילין ומזוזה כאן. משה מתחנן 515 פעמים (כמניין "ואתחנן") להיכנס לארץ — וה' מסרב. הפרשה מלמדת על אהבה כמצווה — לא רק רגש, אלא החלטה. "שמע ישראל" נאמר בכל יום, בכל תפילה, וגם ברגעי החיים הקשים ביותר — חיילים בקרב, נספי שואה ברגע האחרון. זה ה-DNA הרוחני של העם היהודי. "ושננתם לבניך" — העברת מסורת, חינוך, שיחות עם הדור הבא — זו המצווה שמבטיחה שהשרשרת לא תיפסק.`,
46:`"והיה עקב תשמעון" — אם תשמרו את המצוות, גם את ה"קטנות" שרומסים ב"עקב", תבוא הברכה. משה מתאר את ארץ ישראל בשבחים: "ארץ חיטה ושעורה וגפן ותאנה ורימון, ארץ זית שמן ודבש" — שבעת המינים. הוא מזהיר: כשתגיעו לשפע, אל תשכחו מאיפה באתם. "פן תאכל ושבעת ושכחת את ה' אלוהיך." גם ברכת המזון מקורה כאן: "ואכלת ושבעת וברכת את ה' אלוהיך." ופרשה שנייה של קריאת שמע — "והיה אם שמוע". הפרשה מלמדת על הסכנה שבשפע — כשיש הכל, שוכחים להודות. היום, בחברת צריכה ושפע, האזהרה של משה מהדהדת: השפע יכול לעוור. ברכת המזון — לעצור ולהודות על מה שיש, לא לרוץ ל"עוד" — זה מיינדפולנס תורני.`,
47:`"ראה אנוכי נותן לפניכם היום ברכה וקללה" — הבחירה ביד האדם. לא ה' בוחר עבורך, אתה בוחר. ברכה אם תשמעו, קללה אם לא. הפרשה עוסקת במקום המקדש ("המקום אשר יבחר ה'"), בחוקי כשרות, בצדקה ("פתוח תפתח את ידך"), בשמיטת כספים (כל שבע שנים מוחקים חובות!), ובשלוש הרגלים — פסח, שבועות, סוכות. הפרשה מלמדת על בחירה חופשית — יסוד היהדות. אין גורל, אין "ככה נולדתי". אתה בוחר. היום, בעידן של אלגוריתמים שמחליטים עבורנו מה לקנות, מה לראות, מה לחשוב — הקריאה "ראה!" היא קריאת השכמה: תפקח עיניים, תחליט בעצמך. "פתוח תפתח את ידך" — צדקה לא כמעשה טוב אופציונלי, אלא כחובה.`,
48:`"צדק צדק תרדוף" — הפסוק שחקוק בבתי משפט ישראליים. הפרשה מתווה מערכת ממשל שלמה: שופטים שישפטו בצדק, מלך שכפוף לחוק (חייב לשאת ספר תורה!), כוהנים ונביאים. דיני מלחמה — לפני שיוצאים לקרב, שואלים: מי בנה בית חדש? מי שתל כרם? מי ארוס? לכו הביתה. "מי האיש הירא" — גם הוא חוזר, שלא יפחיד אחרים. ערי מקלט, עגלה ערופה (כשנמצא הרוג ולא ידוע מי ההורג). הפרשה מלמדת שצדק הוא לא רק מה שמחליטים, אלא איך מחליטים — הדרך חשובה כמו התוצאה. היום, הויכוח על עצמאות הרשות השופטת בישראל מקבל תאורה חדשה לאור הפרשה. ודיני המלחמה — "מי האיש הירא" — מראים רגישות למצב הנפשי של הלוחם, עקרון שמודרני מאוד.`,
49:`הפרשה עם הכי הרבה מצוות בתורה — 74! היא מכסה כל תחום: מלחמה (אשת יפת תואר), משפחה (בכור, בן סורר ומורה), רחמים (שילוח הקן — לשחרר אם ציפורים לפני שלוקחים ביצים), בנייה (לשים מעקה על הגג), לבוש (לא כלאיים), מציאות (חובה להשיב אבדה), ועוד. הפסוק שמסכם: "לא תוכל להתעלם" — אם אתה רואה משהו — אסור לך להתעלם. חובה לפעול. הפרשה גם מסיימת בציווי לזכור את עמלק שתקף את החלשים. הפרשה מלמדת על רגישות ואחריות בכל תחום. "לא תוכל להתעלם" — זה האנטי-אדישות. שילוח הקן — רחמים על בעלי חיים. מעקה — אחריות על בטיחות. כל מצווה כאן אומרת: שים לב, תהיה ערני, אל תחיה בבועה.`,
50:`כשנכנסים לארץ, צריך להביא ביכורים — ראשית הפירות — למקדש. ובטקס ההבאה אומרים: "ארמי אובד אבי" — סיכום של כל ההיסטוריה: יעקב ירד למצרים, השתעבדנו, זעקנו, ה' הוציא אותנו, והביא אותנו לארץ. זה הנוסח מליל הסדר! אחרי הביכורים — וידוי מעשרות. ואז — ברית חדשה בהר גריזים ובהר עיבל: ברכות וקללות. התוכחה — 98 קללות מפורטות ומצמררות שמתארות בדיוק מה יקרה אם העם יחטא. נבואה שהתממשה בפירוט מדהים. הפרשה מלמדת על הכרת תודה — לעצור, להביא מהראשית, ולספר את הסיפור. היום, "ארמי אובד אבי" נאמר בליל הסדר, מחבר אותנו לשורשים. והתוכחה — אחרי שרואים מה עבר על העם היהודי לאורך ההיסטוריה, קשה לא להזדעזע מהדיוק.`,
51:`פרשה שנקראת תמיד לפני ראש השנה — בזמן הנכון. "אתם ניצבים היום כולכם" — מהמנהיג ועד מביא המים, מהגבר ועד האישה, מהזקן ועד הטף. כולם עומדים יחד לחדש את הברית עם ה'. ואז מגיע פסוק מפתח: "לא בשמיים היא" — התורה לא רחוקה, לא צריך מלאך כדי להבין אותה. היא "בפיך ובלבבך לעשותה". ובסוף — הפסוק שמסכם הכל: "החיים והמוות נתתי לפניך, הברכה והקללה — ובחרת בחיים!" הפרשה מלמדת שלושה דברים חשובים: אחדות (כולם ביחד), נגישות (התורה לכולם), ובחירה (אתה בוחר את הדרך). "ובחרת בחיים" — בעידן של משברי בריאות נפש, אובדנות, וייאוש — זו קריאה להחיים. "לא בשמיים היא" — הידע נגיש, כמו אינטרנט, פתוח לכולם.`,
52:`הפרשה הקצרה ביותר בתורה — 30 פסוקים בלבד. משה בן 120, ביומו האחרון, נפרד מהעם. "לא אוכל עוד לצאת ולבוא" — הכוחות אוזלים. הוא אומר לעם: "חזקו ואמצו!" — אל תפחדו, ה' הולך לפניכם, יהושע ינהיג. משה כותב את התורה ומוסר אותה ללויים. מצוות "הקהל" — כל שבע שנים, בסוכות, כל העם מתאסף — גברים, נשים, טף — לשמוע את קריאת התורה מפי המלך. ה' מגלה למשה שהעם יחטא בעתיד, אבל גם שהברית תישאר. הפרשה מלמדת על פרידה בכבוד ועל מסירת המנהיגות. "חזקו ואמצו" הפך למשפט מפתח בתרבות הישראלית — אומרים אותו בצבא, בבתי חולים, בעתות מלחמה. מצוות הקהל — כל העם ביחד, כולל ילדים — חגיגה לאומית של לימוד.`,
53:`שירת האזינו — אחד הטקסטים העוצמתיים ביותר בתורה. משה מזמין את השמיים והארץ כעדים ומתחיל לשיר. השירה מספרת את כל ההיסטוריה: ה' מצא את ישראל במדבר ושמר עליו, אבל ישראל שכח ופנה לאלילים, ה' כעס ועניש, אבל בסוף — גאולה. "צור תמים פעלו, כי כל דרכיו משפט" — כל מה שה' עושה, גם אם לא מבינים, הוא צודק. משה מסיים את השירה ומצווה לעלות להר נבו — שם הוא ימות. הפרשה מלמדת על כוח השירה כזיכרון. עם ישראל שר — מ"האזינו" לשירי ארץ ישראל, משירת הים לשירי שואה. המוזיקה מחזיקה את הסיפור כשהמילים לא מספיקות. "צור תמים" — משפט שנאמר בימים הקשים ביותר, כאמונה שיש משמעות גם לכאב.`,
54:`הפרשה האחרונה בתורה — ונקראת בשמחת תורה. משה מברך כל שבט בנפרד, ברכה מותאמת אישית: ליהודה — מלכות, ללוי — תורה, לבנימין — חיבה, ליוסף — שפע. ואז — הרגע האחרון. משה עולה להר נבו, ומשם ה' מראה לו את כל הארץ: הגלעד, נפתלי, אפרים, יהודה, הנגב, ירדן יריחו. "זאת הארץ אשר נשבעתי לאברהם ליצחק וליעקב — הראיתיך בעיניך ושמה לא תעבור." משה מת. ה' קוברו בעצמו, ואיש לא יודע איפה הקבר. "ולא קם נביא עוד בישראל כמשה." ומיד — חוזרים ל"בראשית ברא" — המחזוריות הנצחית. שמחת תורה 2023 — 7 באוקטובר — יום שנחרת לנצח. הפרשה מלמדת שגם כשהחלום לא מתממש בשלמות, הוא שווה. משה לא נכנס לארץ — אבל הביא את העם עד השער.`
};

window.setCurrentWeekParsha = function(id){

};

// ========== SIDEBAR ==========
function renderBookTabs(){
  const tabs = document.getElementById('bookTabs');
  let html = `<button class="book-tab active" onclick="filterByBook('all')">הכל</button>`;
  BOOKS.forEach(b => {
    html += `<button class="book-tab" onclick="filterByBook('${b.id}')">${b.name}</button>`;
  });
  tabs.innerHTML = html;
}

function filterByBook(bookId){
  currentBook = bookId;
  document.querySelectorAll('.book-tab').forEach((t,i) => {
    t.classList.toggle('active',
      (bookId === 'all' && i === 0) ||
      (BOOKS[i-1] && BOOKS[i-1].id === bookId)
    );
  });
  const q = document.getElementById('searchInput').value;
  applyFilters(q);
}

function filterParshas(query){
  applyFilters(query);
}

function applyFilters(query){
  filteredParshas = PARSHAS.filter(p => {
    const bookMatch = currentBook === 'all' || p.book === currentBook;
    const queryMatch = !query || p.name.includes(query) || p.ref.includes(query) || p.summary.includes(query);
    const videoMatch = !window.videoOnlyMode || hasVisibleVideo(p.id);
    return bookMatch && queryMatch && videoMatch;
  });
  renderSidebar();
  renderMain();
}

function renderSidebar(){
  const list = document.getElementById('parshaList');

    const hasVideo = hasVisibleVideo(p.id);

    <div class="parsha-item ${currentParsha === p.id ? 'active' : ''} ${p.id === currentWeekParshaId ? 'current-week' : ''} ${hasVideo ? 'has-video' : ''}"

function renderParshaSelect(){

      bamidbar:'ארבעים שנות נדודים במדבר — 10 פרשיות',

  // Reveal inline detail at top + sync sidebar

function closeDetail(){
  currentParsha = null;

document.addEventListener('DOMContentLoaded', init);

<script type="module">
(async () => {
  try {
    const { HDate, Sedra } = await import('https://esm.sh/@hebcal/core@5');
    // מעצב תאריך עברי לכרטיס השיעור
    window.gregToHebrew = (iso) => {
      if(!iso) return '';
      const p = iso.split('-').map(Number);
      try { return new HDate(new Date(p[0], p[1]-1, p[2])).renderGematriya().normalize('NFKD').replace(/[֑-ׇ]/g,''); }
      catch(e){ return ''; }
    };
    // חישוב פרשת השבוע (לוח ארץ-ישראל) — השבת הקרובה, דילוג על חגים
    const idForToday = () => {
      const d = new Date();
      for(let i=0;i<6;i++){
        const hd = new HDate(d);
        const info = new Sedra(hd.getFullYear(), true).lookup(hd);
        if(info && !info.chag && info.num != null) return Array.isArray(info.num) ? info.num[0] : info.num;
        d.setDate(d.getDate()+7);
      }
      return null;
    };
    const id = idForToday();
    if(id && typeof window.setCurrentWeekParsha === 'function') window.setCurrentWeekParsha(id);
    if(typeof window.__onHebcalReady === 'function') window.__onHebcalReady();
  } catch(e){ /* CDN/offline -> static fallback stands */ }
})();
</script>

<script>
/* ===== Enhancements: a11y, dark mode, filter, archive, share, hash routing, PWA ===== */
(function(){
  // ----- Font size (A+/A-) -----
  var FONT_STEPS = [0.9, 1, 1.1, 1.25, 1.4];
  function fontIdx(){
    var v = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-scale')) || 1;
    var i = FONT_STEPS.indexOf(v); return i < 0 ? 1 : i;
  }
  window.adjustFont = function(dir){
    var idx = Math.max(0, Math.min(FONT_STEPS.length - 1, fontIdx() + dir));
    var val = FONT_STEPS[idx];
    document.documentElement.style.setProperty('--font-scale', val);
    try { localStorage.setItem('parsha-font', val); } catch(e){}
  };
  // ----- Dark mode -----
  function syncThemeIcon(){
    var btn = document.getElementById('themeToggle');
    if(btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
  }
  window.toggleTheme = function(){
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if(dark){ document.documentElement.removeAttribute('data-theme'); }
    else { document.documentElement.setAttribute('data-theme','dark'); }
    try { localStorage.setItem('parsha-theme', dark ? 'light' : 'dark'); } catch(e){}
    syncThemeIcon();
  };
  // ----- Video-only filter -----
  window.videoOnlyMode = false;
  window.toggleVideoFilter = function(){
    window.videoOnlyMode = !window.videoOnlyMode;
    var btn = document.getElementById('videoFilterToggle');
    if(btn){ btn.classList.toggle('active', window.videoOnlyMode); btn.setAttribute('aria-pressed', window.videoOnlyMode); }
    applyFilters((document.getElementById('searchInput') || {}).value || '');
  };
  // ----- Toast -----
  var toastTimer;
  window.toast = function(msg){
    var t = document.getElementById('appToast');
    if(!t){ t = document.createElement('div'); t.id = 'appToast'; t.className = 'toast'; document.body.appendChild(t); }
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2400);
  };
  // ----- Share -----
  window.shareParsha = function(type, id){
    var p = PARSHAS.find(function(x){ return x.id === id; }); if(!p) return;
    var url = location.origin + location.pathname + '#' + encodeURIComponent(p.name);
    var text = 'פרשת ' + p.name + ' — פרשת השבוע של משפחת כהן';
    if(type === 'whatsapp') window.open('https://wa.me/?text=' + encodeURIComponent(text + '\n' + url), '_blank', 'noopener');
    else if(type === 'telegram') window.open('https://t.me/share/url?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text), '_blank', 'noopener');
    else if(type === 'email') location.href = 'mailto:?subject=' + encodeURIComponent(text) + '&body=' + encodeURIComponent(text + '\n' + url);
    else if(type === 'copy'){
      (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
        .then(function(){ window.toast('הקישור הועתק ✓'); })
        .catch(function(){ window.prompt('העתק את הקישור:', url); });
    }
  };
  function toolbarHTML(id){
    return '<div class="detail-toolbar">' +
      '<button class="dt-btn dt-wa" onclick="shareParsha(&quot;whatsapp&quot;,' + id + ')">שיתוף בוואטסאפ</button>' +
      '<button class="dt-btn dt-print" onclick="printParsha(' + id + ')">🖨️ הדפסה</button>' +
    '</div>';
  }
  // ----- Wrap openDetail/closeDetail: hash routing + share toolbar -----
  function printParsha(id){
    var p = PARSHAS.find(function(x){ return x.id === id; }); if(!p) return;
    var ex = (typeof EXTRA !== 'undefined' && EXTRA[id]) ? EXTRA[id] : {};
    var easy = (typeof EASY_EXPLAIN !== 'undefined' && EASY_EXPLAIN[id]) ? EASY_EXPLAIN[id] : '';
    var bk = {bereshit:'בראשית',shemot:'שמות',vayikra:'ויקרא',bamidbar:'במדבר',devarim:'דברים'};
    var E = function(v){ return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
    var sec = function(t,h){ return h ? '<h2>'+E(t)+'</h2>'+h : ''; };
    var themes = (p.themes||[]).map(function(t){ return '<li>'+E(t)+'</li>'; }).join('');
    var comm = (ex.commentaries||[]).map(function(c){ return '<div class="cm"><b>'+E(c.source)+'</b><p>'+E(c.text)+'</p></div>'; }).join('');
    var doc = '<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>פרשת '+E(p.name)+'</title>'+
      '<style>@page{margin:18mm 16mm}'+
      'body{font-family:"Frank Ruhl Libre",Georgia,serif;color:#111;line-height:1.72;font-size:12pt;margin:0}'+
      'h1{font-size:30pt;font-weight:900;border-bottom:2px solid #000;padding-bottom:6px;margin:0 0 4px}'+
      '.ref{font-size:11pt;color:#555;margin-bottom:16px}'+
      'h2{font-size:15pt;border-bottom:1px solid #999;padding-bottom:3px;margin:16px 0 6px}'+
      'p{margin:0 0 8px}ul{margin:0;padding-inline-start:20px}li{margin-bottom:3px}'+
      '.verse{background:#f3f3f3;border-right:3px solid #000;padding:10px 14px;font-style:italic;margin:4px 0}'+
      '.cm{border-right:2px solid #777;padding:4px 12px;margin:0 0 8px}.cm b{display:block}'+
      '.ft{margin-top:24px;padding-top:8px;border-top:1px solid #999;text-align:center;font-size:9pt;color:#666}'+
      '</style></head><body>'+
      '<h1>פרשת '+E(p.name)+'</h1>'+

      sec('הסבר בשפה קלה', easy ? '<p>'+E(easy)+'</p>' : '')+
      sec('תקציר', p.details ? '<p>'+E(p.details)+'</p>' : '')+
      (p.keyVerse ? '<h2>פסוק מפתח</h2><div class="verse">"'+E(p.keyVerse)+'"' + (p.verseRef?' — '+E(p.verseRef):'') + '</div>' : '')+

      '<div class="ft">פרשת השבוע של משפחת כהן · parasha.erezults.com</div></body></html>';
    var f = document.createElement('iframe');
    f.setAttribute('aria-hidden','true');
    f.style.cssText = 'position:fixed;left:-9999px;top:0;width:0;height:0;border:0';
    document.body.appendChild(f);
    var d = f.contentWindow.document; d.open(); d.write(doc); d.close();
    setTimeout(function(){ try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ try{window.print();}catch(_){} } setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); }, 2500); }, 400);
  }
  var _open = window.openDetail;
  window.openDetail = function(id){

    items.sort(function(a,b){ return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0); });
    document.getElementById('mainContent').innerHTML = '<div class="detail-content main-fade">' +
      '<button class="detail-back" onclick="closeDetail()"><span>→</span> חזרה לכל הפרשות</button>' +
      '<h1 class="detail-title">🎬 כל השיעורים</h1>' +
      '<div class="detail-ref">' + items.length + ' שיעורים זמינים — מהחדש לישן</div>' +
      '<div class="archive-grid">' + items.map(function(x){
        return '<button class="archive-item" onclick="openDetail(' + x.id + ')">' +
          '<div class="archive-thumb"><img src="https://i.ytimg.com/vi/' + x.vid + '/mqdefault.jpg" alt="" loading="lazy"><span class="archive-play">▶</span></div>' +
          '<div class="archive-meta"><div class="archive-name">פרשת ' + x.name + '</div><div class="archive-date">' + (x.year ? x.year + ' · ' : '') + fmtGreg(x.date) + '</div></div>' +
        '</button>';
      }).join('') + '</div></div>';
    renderSidebar();
    window.scrollTo(0, 0);
  };
  // ----- Hash deep-linking -----
  function openFromHash(){
    var h = decodeURIComponent((location.hash || '').replace(/^#/, ''));
    if(!h){ if(currentParsha !== null && currentParsha !== -1) window.closeDetail(); return; }
    var p = PARSHAS.find(function(x){ return x.name === h; }) || PARSHAS.find(function(x){ return String(x.id) === h; });
    if(p && p.id !== currentParsha) window.openDetail(p.id);
  }
  window.addEventListener('popstate', openFromHash);
  // ----- Back to top -----
  window.addEventListener('scroll', function(){
    var b = document.getElementById('backToTop');
    if(b) b.classList.toggle('visible', window.scrollY > 400);
  }, { passive: true });
  // ----- Init -----
  function enhInit(){ syncThemeIcon(); loadVideosJson(); if(location.hash) openFromHash(); }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', enhInit); else enhInit();
  // ----- PWA service worker -----
  if('serviceWorker' in navigator && location.protocol !== 'file:'){
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
})();
</script>

<script>
(function(){
  var allowed = ['parasha.erezults.com','slides.erezults.com','localhost','127.0.0.1',''];
  var h = location.hostname;
  var isLan = /^(192\.168\.|10\.|172\.(1[6-9]|2\d|3[01])\.)/.test(h);
  if (!allowed.includes(h) && !h.endsWith('.local') && !isLan) {
    document.body.innerHTML = '<div class="er-block"><h2>⚠️ גישה לא מורשית</h2><p>מצגת זו זמינה רק דרך<br><strong>parasha.erezults.com</strong></p><p style="font-size:13px;margin-top:8px">© E-Rezults — כל הזכויות שמורות</p></div>';
    return;
  }
  document.addEventListener('contextmenu', function(e){e.preventDefault()});
  document.addEventListener('keydown', function(e){
    if (e.ctrlKey && 'supijc'.indexOf(e.key.toLowerCase())!==-1) e.preventDefault();
    if (e.key === 'F12') e.preventDefault();
    if (e.ctrlKey && e.shiftKey) e.preventDefault();
  });
  document.addEventListener('dragstart', function(e){e.preventDefault()});
  window.addEventListener('beforeprint', function(){ document.body.style.display='none'; });
  window.addEventListener('afterprint', function(){ document.body.style.display=''; });
})();
</script>
